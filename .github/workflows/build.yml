name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK (arm64)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential \
            libssl-dev libffi-dev \
            python3-dev \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake \
            libltdl-dev \
            libsqlite3-dev \
            lld \
            ccache

      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 virtualenv

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Point buildozer at pre-installed NDK
        run: |
          # Use NDK already on runner instead of downloading
          mkdir -p ~/.buildozer/android/platform
          ln -sfn $ANDROID_NDK_HOME \
            ~/.buildozer/android/platform/android-ndk-r25b || true
          echo "NDK location: $ANDROID_NDK_HOME"

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee buildozer_output.log
        env:
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "26"

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" | grep -v ".buildozer/android/platform" | head -1)
          [ -z "$APK" ] && APK=$(find .buildozer -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: nanosideband-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_output.log
          retention-days: 7

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v') && steps.find_apk.outputs.apk_path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
