name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-android:
    name: Build APK (arm64)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Android SDK / buildozer) ───────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── System dependencies ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential \
            libssl-dev libffi-dev \
            python3-dev \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake \
            libltdl-dev \
            libsqlite3-dev \
            lld \
            ccache \
            adb

      # ── Python build tools ───────────────────────────────────────────────
      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 virtualenv

      # ── Cache: buildozer global directory ────────────────────────────────
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── Cache: Android SDK / NDK ─────────────────────────────────────────
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-33
          restore-keys: |
            android-sdk-${{ runner.os }}-

      # ── Accept Android licenses ──────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/repositories.cfg
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses \
            2>/dev/null || true

      # ── Build APK ────────────────────────────────────────────────────────
      - name: Build APK with buildozer
        run: |
          # Ensure buildozer can write to home
          export BUILDOZER_WARN_ON_ROOT=0
          buildozer -v android debug 2>&1 | tee buildozer_output.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── Find APK ─────────────────────────────────────────────────────────
      - name: Locate built APK
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh $APK

      # ── Upload APK as artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosideband-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # ── Upload build log on failure ───────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_output.log
          retention-days: 7

      # ── Create GitHub Release on tag push ────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
